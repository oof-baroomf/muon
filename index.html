<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self'">
    <title>Infinite Canvas Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <div id="canvas">
            <!-- Visual placeholders for BrowserViews will be added here by renderer.js -->
        </div>

        <div id="controls-container">
            <!-- Initially hidden URL input area -->
            <div id="url-input-area" style="display: none;">
                <input type="text" id="urlInput" placeholder="Enter Website URL or search query">
                <button id="submitUrlButton" title="Load Website">↵</button>
            </div>
        </div>

        <!-- Initial UI elements shown in the video -->
        <div id="initial-plus-container">
            <div id="initial-plus">+</div>
        </div>
        <div class="bottom-fixed-button" id="initial-w-button">W</div>
        <div class="bottom-fixed-button" id="action-enter-button" style="display: none;">↵</div>

    </div>
    <script src="renderer.js"></script>
</body>
</html>
