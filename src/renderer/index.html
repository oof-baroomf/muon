<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';">
    <meta charset="UTF-8">
    <title>Infinite Canvas</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <!-- lightweight URL-input overlay -->
    <div id="urlPrompt" style="position:fixed; inset:0; display:none;
         backdrop-filter:blur(3px); align-items:center; justify-content:center;">
        <div style="background:#1e1e1e; padding:1rem; border-radius:8px;
                    box-shadow:0 4px 14px rgba(0,0,0,.6);">
            <input id="urlInput" type="text" placeholder="https://example.com"
                   style="width:22rem; padding:.5rem; border-radius:4px; border:1px solid #444;
                          background:#000; color:#fff;">
            <button id="urlOk"     style="margin-left:.5rem;">Open</button>
            <button id="urlCancel" style="margin-left:.25rem;">Cancel</button>
        </div>
    </div>
    <script type="module" src="./canvas.js"></script>
</body>
</html>
