<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Infinite Canvas Browser</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #222; width: 100%; height: 100%; font-family: sans-serif; }
        #url-input-container { padding: 10px; background-color: #282828; display: flex; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000; }
        #url-input { padding: 8px 12px; border-radius: 4px; border: 1px solid #555; background-color: #333; color: white; width: 350px; font-size: 14px; }
        #canvas-wrapper { flex-grow: 1; position: relative; overflow: hidden; }
        #canvas { width: 100%; height: 100%; background-color: #303030; position: absolute; transform-origin: 0 0; cursor: grab; }
        .view-placeholder {
            position: absolute; border: 1px solid rgba(255,255,255,0.2); background-color: rgba(0,0,0,0.1);
            box-sizing: border-box; box-shadow: 0 0 8px rgba(0,0,0,0.4);
        }
        .view-placeholder .close-button {
            position: absolute; top: 0px; right: 0px; background-color: #cc3333; color: white;
            border: none; border-bottom-left-radius: 6px; padding: 2px 6px; cursor: pointer; font-size: 12px; line-height: 1; z-index: 1;
        }
        .view-placeholder .close-button:hover { background-color: #aa2222; }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; height: 100vh;">
        <div id="url-input-container">
            <input type="text" id="url-input" placeholder="Enter URL and press Enter">
        </div>
        <div id="canvas-wrapper">
            <div id="canvas"></div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
