<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minimal Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="titlebar">
        <div class="drag-region"></div>
        <div class="window-controls">
            <button id="minimizeBtn" title="Minimize">-</button>
            <button id="maximizeBtn" title="Maximize">◻</button>
            <button id="closeBtn" title="Close">✕</button>
        </div>
    </div>
    <div class="toolbar">
        <button id="backButton" title="Back">←</button>
        <input type="text" id="urlInput" placeholder="Search or enter URL">
    </div>
    <script src="renderer.js"></script>
</body>
</html>
